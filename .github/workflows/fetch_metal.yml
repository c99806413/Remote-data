name: 每日获取金属价格

on:
  schedule:
    - cron: '30 16 * * *'   # 每天 UTC 16:30（北京时间次日 00:30），收盘后更新
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install akshare pandas

      - name: 运行脚本
        run: python fetch_metal_prices.py

      - name: 提交更改
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 自动更新金属价格 (akshare)"
          file_pattern: "data/*.json"
          push_options: '--force'
