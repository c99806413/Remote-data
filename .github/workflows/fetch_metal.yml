name: 每日获取金属价格

on:
  schedule:
    - cron: '30 8 * * *'   # 每天 UTC 08:30（北京时间 16:30），收盘后执行
  workflow_dispatch:       # 保留手动触发按钮，方便你测试

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests

      - name: 运行抓取脚本
        run: python fetch_metal_prices.py

      - name: 提交更改
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [SHFE] 自动更新金属价格"
          file_pattern: "data/*.json"
          push_options: '--force'
