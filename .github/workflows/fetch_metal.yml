name: 每日获取金属价格

on:
  schedule:
    - cron: '30 9 * * *'   # 每天 UTC 09:30（北京时间 17:30）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行脚本
        run: python fetch_metal_prices.py

      - name: 提交更改
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 [SHFE] 自动更新金属价格"
          file_pattern: "data/*.json"
          push_options: '--force'
